# Google Cloud Build — Professional CI/CD Pipeline
# Automates testing, building, and deployment to Cloud Run.

steps:
  # 1. Install dependencies
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['install']

  # 2. Run Security Audit
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['audit']

  # 3. Run Unit Tests (Ensuring 100% Reliability)
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['test']

  # 4. Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/lumina-learn:$COMMIT_SHA', '.']

  # 5. Push to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lumina-learn:$COMMIT_SHA']

  # 6. Deploy to Cloud Run (Serverless)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'lumina-learn'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lumina-learn:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
